name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "23 10 * * 1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  checks:
    name: Typecheck and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  electron-smoke:
    name: Electron smoke on macOS
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Electron smoke
        run: pnpm test:smoke

      - name: Upload smoke artifacts
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: electron-smoke-artifacts-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            output/playwright/**
            test-results/**
            playwright-report/**
            artifacts/release/**

  performance-smoke:
    name: Performance smoke
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Performance smoke
        run: pnpm test:perf

      - name: Upload performance artifacts
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: performance-smoke-artifacts-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            artifacts/perf/**
            output/playwright/**
