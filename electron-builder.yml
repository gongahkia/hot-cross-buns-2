appId: dev.hotcrossbuns.hotcrossbuns2
productName: Hot Cross Buns 2
artifactName: Hot-Cross-Buns-2-${version}-${os}-${arch}.${ext}

directories:
  output: release

files:
  - out/**/*
  - package.json
  - "!node_modules/**"
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
  - node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3/**/*
  - node_modules/.pnpm/bindings@*/node_modules/bindings/**/*
  - node_modules/.pnpm/file-uri-to-path@*/node_modules/file-uri-to-path/**/*
  - "!**/*.map"
  - "!src/**"
  - "!docs/**"
  - "!scripts/**"
  - "!tests/**"
  - "!artifacts/**"
  - "!output/**"

asar: true
asarUnpack:
  - node_modules/**/better_sqlite3.node
compression: normal
npmRebuild: true

extraResources:
  - from: assets/brand
    to: assets/brand

mac:
  identity: null
  icon: build/icon.icns
  category: public.app-category.productivity
  gatekeeperAssess: false
  hardenedRuntime: false
  protocols:
    - name: Hot Cross Buns Links
      schemes:
        - hotcrossbuns
  target:
    - dmg
    - zip

dmg:
  sign: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icons
  category: Office
  executableName: hot-cross-buns-2
  synopsis: Private planner for tasks, calendars, notes, and local agent workflows.
  description: Hot Cross Buns 2 Linux technical preview for GNOME desktops.
  desktop:
    entry:
      GenericName: Planner
      Keywords: tasks;calendar;notes;planner;productivity;
      StartupWMClass: hot-cross-buns-2

appImage:
  artifactName: Hot-Cross-Buns-2-${version}-linux-${arch}.${ext}
