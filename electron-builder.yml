appId: dev.hotcrossbuns.hotcrossbuns2
productName: Hot Cross Buns 2
artifactName: Hot-Cross-Buns-2-${version}-${os}-${arch}.${ext}

directories:
  output: release

files:
  - out/**/*
  - package.json
  - "!node_modules/**"
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*
  - node_modules/.pnpm/better-sqlite3@*/node_modules/better-sqlite3/**/*
  - node_modules/.pnpm/bindings@*/node_modules/bindings/**/*
  - node_modules/.pnpm/file-uri-to-path@*/node_modules/file-uri-to-path/**/*
  - "!**/*.map"
  - "!src/**"
  - "!docs/**"
  - "!scripts/**"
  - "!tests/**"
  - "!artifacts/**"
  - "!output/**"

asar: true
asarUnpack:
  - node_modules/**/better_sqlite3.node
compression: normal
npmRebuild: true

extraResources:
  - from: assets/brand
    to: assets/brand

protocols:
  - name: Hot Cross Buns Links
    schemes:
      - hotcrossbuns

mac:
  identity: null
  icon: build/icon.icns
  category: public.app-category.productivity
  gatekeeperAssess: false
  hardenedRuntime: false
  target:
    - dmg
    - zip

dmg:
  sign: false
